<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandra's Pre-Foreclosure Drive-By Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117; color: #e1e4e8; min-height: 100vh;
    }
    .header {
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 16px 20px; display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .header h1 { font-size: 1.3rem; font-weight: 700; color: #f0f6fc; }
    .header p  { font-size: 0.8rem; color: #8b949e; margin-top: 2px; }

    .stats-strip {
      background: #1c2128; padding: 10px 20px;
      display: flex; gap: 20px; border-bottom: 1px solid #30363d; flex-wrap: wrap;
    }
    .stat { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-red    { background: #f85149; }
    .dot-orange { background: #e3b341; }
    .dot-yellow { background: #d29922; }
    .dot-blue   { background: #58a6ff; }
    .dot-gray   { background: #6e7681; }
    .stat span  { color: #8b949e; }
    .stat strong { color: #f0f6fc; }

    #progress-bar-wrap {
      background: #161b22; padding: 14px 20px;
      border-bottom: 1px solid #30363d; display: none;
    }
    #progress-label { font-size: 0.85rem; color: #8b949e; margin-bottom: 6px; }
    #progress-track {
      background: #21262d; border-radius: 4px; height: 8px; overflow: hidden;
    }
    #progress-fill {
      background: #238636; height: 100%; width: 0%; transition: width 0.3s;
    }

    #map { width: 100%; height: 420px; border-bottom: 1px solid #30363d; }

    /* Filters */
    .filters {
      background: #161b22; padding: 12px 20px;
      border-bottom: 1px solid #30363d;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .filters label { font-size: 0.82rem; color: #8b949e; }
    .filter-btn {
      background: #21262d; border: 1px solid #30363d; color: #e1e4e8;
      padding: 5px 12px; border-radius: 20px; font-size: 0.78rem; cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active { background: #238636; border-color: #238636; color: #fff; }
    .filter-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    #search-input {
      background: #21262d; border: 1px solid #30363d; color: #e1e4e8;
      padding: 5px 10px; border-radius: 6px; font-size: 0.82rem;
      outline: none; width: 200px;
    }
    #search-input::placeholder { color: #6e7681; }
    #result-count { font-size: 0.78rem; color: #8b949e; margin-left: auto; }

    /* Cards */
    .cards-section { padding: 20px; max-width: 1200px; margin: 0 auto; }
    .cards-section h2 {
      font-size: 0.88rem; font-weight: 600; color: #8b949e;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
    }

    .prop-card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; overflow: hidden; cursor: pointer;
      transition: border-color 0.2s;
    }
    .prop-card:hover { border-color: #58a6ff; }
    .prop-card.signal-critical { border-color: #f85149; box-shadow: 0 0 0 1px #f85149; }
    .prop-card.signal-high     { border-color: #e3b341; }
    .prop-card.signal-medium   { border-color: #d29922; }

    .card-header {
      padding: 12px 14px; background: #1c2128;
      border-bottom: 1px solid #30363d;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .card-address { font-weight: 700; font-size: 0.95rem; color: #f0f6fc; }
    .card-city    { font-size: 0.75rem; color: #8b949e; margin-top: 2px; }
    .badge {
      padding: 3px 8px; border-radius: 20px; font-size: 0.7rem;
      font-weight: 700; white-space: nowrap; flex-shrink: 0; margin-left: 8px;
    }
    .badge-red    { background: #3d1a19; color: #f85149; }
    .badge-orange { background: #3d2e0a; color: #e3b341; }
    .badge-yellow { background: #2d2511; color: #d29922; }
    .badge-blue   { background: #112233; color: #58a6ff; }
    .badge-gray   { background: #21262d; color: #8b949e; }

    .card-signals { padding: 8px 14px; display: flex; gap: 6px; flex-wrap: wrap; border-bottom: 1px solid #21262d; }
    .sig-tag {
      font-size: 0.68rem; padding: 2px 6px; border-radius: 4px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .sig-shutoff { background: #3d1a19; color: #f85149; }
    .sig-vacant  { background: #1f2937; color: #60a5fa; }
    .sig-absentee{ background: #1a2030; color: #7c3aed; color: #a78bfa; }
    .sig-fc      { background: #3d2e0a; color: #e3b341; }
    .sig-poor    { background: #1c1a22; color: #d1d5db; }
    .sig-tax     { background: #2d1a0a; color: #fb923c; }
    .sig-reverse { background: #1a2d1a; color: #4ade80; }

    .card-details { padding: 10px 14px; }
    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 0; border-bottom: 1px solid #21262d; font-size: 0.82rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #8b949e; }
    .detail-value { color: #f0f6fc; font-weight: 500; text-align: right; max-width: 60%; }
    .detail-value.warn { color: #e3b341; }
    .detail-value.danger { color: #f85149; }

    .card-footer { padding: 10px 14px; border-top: 1px solid #30363d; }
    .goto-btn {
      display: block; text-align: center; background: #21262d; color: #58a6ff;
      text-decoration: none; padding: 7px; border-radius: 6px;
      font-size: 0.82rem; font-weight: 600; transition: background 0.2s;
      cursor: pointer; border: none; width: 100%;
    }
    .goto-btn:hover { background: #30363d; }

    /* Leaflet dark overrides */
    .leaflet-container { background: #0f1117; }
    .leaflet-popup-content-wrapper {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      color: #e1e4e8; box-shadow: 0 8px 24px rgba(0,0,0,0.7);
    }
    .leaflet-popup-tip { background: #161b22; }
    .leaflet-popup-content { margin: 10px 14px; }
    .popup-addr { font-weight: 700; font-size: 0.92rem; color: #f0f6fc; margin-bottom: 4px; }
    .popup-owner { font-size: 0.8rem; color: #8b949e; margin-bottom: 6px; }
    .popup-signals { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
    .popup-row { font-size: 0.78rem; color: #8b949e; margin: 2px 0; }
    .popup-row strong { color: #f0f6fc; }
    .popup-link {
      display: inline-block; margin-top: 8px; background: #238636; color: #fff;
      text-decoration: none; padding: 5px 10px; border-radius: 5px;
      font-size: 0.78rem; font-weight: 600;
    }
    .leaflet-popup-close-button { color: #8b949e !important; }

    /* Legend */
    .legend {
      position: absolute; bottom: 8px; left: 8px; z-index: 1000;
      background: rgba(22,27,34,0.92); border: 1px solid #30363d;
      border-radius: 6px; padding: 8px 12px; font-size: 0.75rem;
    }
    .legend-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; color: #8b949e; }
    .leg-dot { width: 10px; height: 10px; border-radius: 50%; }

    .hidden { display: none !important; }

    @keyframes gps-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(79,195,247,0.5), 0 2px 8px rgba(0,0,0,0.5); }
      70%  { box-shadow: 0 0 0 12px rgba(79,195,247,0), 0 2px 8px rgba(0,0,0,0.5); }
      100% { box-shadow: 0 0 0 0 rgba(79,195,247,0), 0 2px 8px rgba(0,0,0,0.5); }
    }

    @media (max-width: 600px) {
      .header { padding: 12px 14px; }
      #map { height: 340px; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

// ── Signal helpers ────────────────────────────────────────────────────────
function signalColor(p) {
  if (p.onShutoff || p.score >= 60) return 'critical';
  if (p.score >= 40) return 'high';
  if (p.score >= 20) return 'medium';
  return 'low';
}

function markerColor(p) {
  const sc = signalColor(p);
  if (sc === 'critical') return '#f85149';
  if (sc === 'high')     return '#e3b341';
  if (sc === 'medium')   return '#d29922';
  return '#58a6ff';
}

function markerLabel(p) {
  if (p.onShutoff)  return 'S';
  if (p.vacant)     return 'V';
  if (['Very High','High'].includes(p.fcFactor)) return 'FC';
  if (p.loanType && p.loanType.includes('Reverse')) return 'R';
  return '·';
}

function makeCircleIcon(color, label) {
  const size = label.length > 1 ? 42 : 36;
  const html = `<div style="
    width:${size}px;height:${size}px;border-radius:50%;
    background:${color};border:2.5px solid rgba(255,255,255,0.85);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:${label.length > 1 ? 12 : 15}px;
    color:#fff;font-family:sans-serif;
    box-shadow:0 2px 8px rgba(0,0,0,0.6);
    position:relative;
  ">${label}<div style="
    position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
    width:2px;height:8px;background:${color};
  "></div></div>`;
  return L.divIcon({
    html, className: '',
    iconSize: [size, size+8],
    iconAnchor: [size/2, size+8],
    popupAnchor: [0, -(size+6)]
  });
}

function signalTags(p) {
  const tags = [];
  if (p.onShutoff) tags.push('<span class="sig-tag sig-shutoff">JEA Shutoff</span>');
  if (p.vacant)    tags.push('<span class="sig-tag sig-vacant">Vacant</span>');
  if (!p.ownerOcc && p.mailState && !['FL','','fl'].includes(p.mailState))
    tags.push(`<span class="sig-tag sig-absentee">OOS Mail (${p.mailState})</span>`);
  if (['Very High','High'].includes(p.fcFactor))
    tags.push(`<span class="sig-tag sig-fc">${p.fcFactor} FC</span>`);
  else if (p.fcFactor === 'Medium High')
    tags.push('<span class="sig-tag sig-fc">Med-High FC</span>');
  if (p.extCond === 'Poor') tags.push('<span class="sig-tag sig-poor">Poor Exterior</span>');
  if (p.lienType && p.lienType.includes('Tax'))
    tags.push('<span class="sig-tag sig-tax">Tax Lien</span>');
  if (p.loanType && p.loanType.includes('Reverse'))
    tags.push('<span class="sig-tag sig-reverse">Reverse Mtg</span>');
  return tags.join('');
}

function fmtMoney(v) {
  if (!v) return '—';
  v = String(v).replace(/[^0-9.-]/g,'');
  if (!v) return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return '$' + Math.round(n/1000) + 'K';
  return '$' + n.toFixed(0);
}

function cardBadge(p) {
  if (p.onShutoff) return '<span class="badge badge-red">SHUTOFF</span>';
  if (p.score >= 60) return '<span class="badge badge-red">WALK-AWAY</span>';
  if (p.score >= 40) return '<span class="badge badge-orange">HIGH SIGNAL</span>';
  if (p.score >= 20) return '<span class="badge badge-yellow">MEDIUM</span>';
  return '<span class="badge badge-gray">MONITOR</span>';
}

// ── Cards ─────────────────────────────────────────────────────────────────
function makeCard(p, idx) {
  const sc = signalColor(p);
  const cardClass = sc === 'critical' ? 'signal-critical' : sc === 'high' ? 'signal-high' : sc === 'medium' ? 'signal-medium' : '';
  const tags = signalTags(p);
  const ltv = p.ltv ? parseFloat(p.ltv.replace('%','')) : 0;
  const ltvColor = ltv > 100 ? 'danger' : ltv > 85 ? 'warn' : '';

  return `<div class="prop-card ${cardClass}" data-idx="${idx}" id="card-${idx}">
    <div class="card-header">
      <div>
        <div class="card-address">${p.addr}</div>
        <div class="card-city">${p.city}, ${p.state} ${p.zip}</div>
      </div>
      ${cardBadge(p)}
    </div>
    ${tags ? `<div class="card-signals">${tags}</div>` : ''}
    <div class="card-details">
      ${p.owner ? `<div class="detail-row"><span class="detail-label">Owner</span><span class="detail-value">${p.owner}</span></div>` : ''}
      <div class="detail-row">
        <span class="detail-label">Size</span>
        <span class="detail-value">${p.beds||'?'}bd / ${p.baths||'?'}ba &bull; ${p.sqft ? p.sqft.replace(/\B(?=(\d{3})+(?!\d))/g,',') + ' sf' : '?sf'} &bull; ${p.yr||'?'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Est Value / Equity</span>
        <span class="detail-value">${fmtMoney(p.estVal)} / ${fmtMoney(p.estEq)}</span>
      </div>
      ${p.ltv ? `<div class="detail-row"><span class="detail-label">LTV</span><span class="detail-value ${ltvColor}">${p.ltv}</span></div>` : ''}
      ${p.preFcDef ? `<div class="detail-row"><span class="detail-label">FC Default Amt</span><span class="detail-value danger">${fmtMoney(p.preFcDef)}</span></div>` : ''}
      ${p.preFcBal ? `<div class="detail-row"><span class="detail-label">FC Unpaid Bal</span><span class="detail-value warn">${fmtMoney(p.preFcBal)}</span></div>` : ''}
      ${p.preFcDate ? `<div class="detail-row"><span class="detail-label">FC Filed</span><span class="detail-value">${p.preFcDate}</span></div>` : ''}
      ${p.lienType ? `<div class="detail-row"><span class="detail-label">Lien</span><span class="detail-value warn">${p.lienType} ${p.lienAmt ? '($'+parseFloat(p.lienAmt).toFixed(0)+')' : ''}</span></div>` : ''}
      ${p.loanType ? `<div class="detail-row"><span class="detail-label">Loan</span><span class="detail-value">${p.loanType.length > 35 ? p.loanType.substring(0,35)+'…' : p.loanType}</span></div>` : ''}
    </div>
    <div class="card-footer">
      <button class="goto-btn" onclick="flyToMarker(${idx})">📍 View on map</button>
    </div>
  </div>`;
}

let gpsMarker = null;
let gpsAccCircle = null;
let userLatLng = null;

const gpsDotHtml = `<div style="
  width:20px;height:20px;border-radius:50%;
  background:rgba(79,195,247,0.9);
  border:2.5px solid #fff;
  box-shadow:0 0 0 6px rgba(79,195,247,0.25), 0 2px 8px rgba(0,0,0,0.5);
  animation:gps-pulse 2s ease-in-out infinite;
"></div>`;

function initGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const acc = pos.coords.accuracy;
    userLatLng = L.latLng(lat, lng);

    if (!gpsMarker) {
      gpsMarker = L.marker([lat, lng], {
        icon: L.divIcon({ html: gpsDotHtml, className:'', iconSize:[20,20], iconAnchor:[10,10] }),
        zIndexOffset: 9999
      }).addTo(map).bindPopup('<strong>You are here</strong>');

      gpsAccCircle = L.circle([lat, lng], {
        radius: acc, color:'#4fc3f7', fillColor:'#4fc3f7',
        fillOpacity:0.08, weight:1, opacity:0.4
      }).addTo(map);
    } else {
      gpsMarker.setLatLng([lat, lng]);
      gpsAccCircle.setLatLng([lat, lng]).setRadius(acc);
    }
  }, null, {enableHighAccuracy:true, maximumAge:5000, timeout:15000});
}

// ── Nearest button ────────────────────────────────────────────────────────
function sortByNearest() {
  if (!userLatLng) { alert('GPS not yet acquired — wait a moment and try again.'); return; }
  const withDist = [...Array(PROPERTIES.length).keys()].map(i => {
    const coords = geocodeCache[PROPERTIES[i].full];
    if (!coords) return {i, dist: Infinity};
    const dist = userLatLng.distanceTo(L.latLng(coords.lat, coords.lng));
    return {i, dist};
  });
  withDist.sort((a,b) => a.dist - b.dist);
  const sorted = withDist.map(x => x.i);
  renderCards(sorted);
}

// ── Geocoding ─────────────────────────────────────────────────────────────
const geocodeCache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');

async function geocodeOne(p) {
  const key = p.full;
  if (geocodeCache[key]) return geocodeCache[key];
  const q = encodeURIComponent(p.full);
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${q}`;
  try {
    const resp = await fetch(url, {headers: {'User-Agent': 'Sandra-DriveByMap/1.0'}});
    const data = await resp.json();
    if (data && data.length > 0) {
      const coords = {lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon)};
      geocodeCache[key] = coords;
      localStorage.setItem(CACHE_KEY, JSON.stringify(geocodeCache));
      return coords;
    }
  } catch(e) {}
  return null;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function geocodeAll() {
  const wrap = document.getElementById('progress-bar-wrap');
  const label = document.getElementById('progress-label');
  const fill = document.getElementById('progress-fill');

  const uncached = PROPERTIES.filter(p => !geocodeCache[p.full]);
  if (uncached.length > 0) {
    wrap.style.display = 'block';
    let done = 0;
    for (const p of uncached) {
      await geocodeOne(p);
      done++;
      const pct = Math.round((done / uncached.length) * 100);
      fill.style.width = pct + '%';
      label.textContent = `Geocoding addresses for first-time use (cached after this)… ${done} / ${uncached.length}`;
      await sleep(1100); // Nominatim rate limit: 1 req/sec
    }
    wrap.style.display = 'none';
  }
  buildMarkers();
  renderCards(allVisible);
}

function popupHtml(p) {
  const tags = signalTags(p);
  return `<div class="popup-addr">${p.addr}</div>
    <div class="popup-owner">${p.owner || 'Unknown owner'} &bull; ${p.city}, ${p.zip}</div>
    <div class="popup-signals">${tags}</div>
    <div class="popup-row">${p.beds}bd / ${p.baths}ba &bull; ${p.sqft}sf &bull; ${p.yr}</div>
    <div class="popup-row">Est Value: <strong>${fmtMoney(p.estVal)}</strong> &bull; Equity: <strong>${fmtMoney(p.estEq)}</strong></div>
    ${p.preFcDef ? `<div class="popup-row" style="color:#f85149">FC Default: <strong>${fmtMoney(p.preFcDef)}</strong></div>` : ''}
    <a class="popup-link" href="https://maps.google.com/?q=${encodeURIComponent(p.full)}" target="_blank">Google Maps</a>`;
}

function buildMarkers() {
  PROPERTIES.forEach((p, idx) => {
    const coords = geocodeCache[p.full];
    if (!coords) return;
    const marker = L.marker([coords.lat, coords.lng], {icon: makeCircleIcon(markerColor(p), markerLabel(p))})
      .bindPopup(popupHtml(p), {maxWidth: 280})
      .addTo(map);
    marker.on('click', () => {
      const card = document.getElementById('card-' + idx);
      if (card) card.scrollIntoView({behavior: 'smooth', block: 'center'});
    });
    markers[idx] = marker;
  });
}

function flyToMarker(idx) {
  const m = markers[idx];
  if (m) {
    map.flyTo(m.getLatLng(), 17, {duration: 1});
    setTimeout(() => m.openPopup(), 1100);
  } else {
    alert('This property has not been geocoded yet.');
  }
}

// ── Cards rendering ───────────────────────────────────────────────────────
function renderCards(idxList) {
  const grid = document.getElementById('cards-grid');
  const count = document.getElementById('result-count');
  grid.innerHTML = idxList.map(i => makeCard(PROPERTIES[i], i)).join('');
  count.textContent = `Showing ${idxList.length} of 414`;
}

// ── Filters ───────────────────────────────────────────────────────────────
let activeFilter = 'all';
let searchQuery  = '';

function applyFilters() {
  let list = [...Array(PROPERTIES.length).keys()];

  if (activeFilter === 'shutoff') list = list.filter(i => PROPERTIES[i].onShutoff);
  else if (activeFilter === 'vacant')   list = list.filter(i => PROPERTIES[i].vacant);
  else if (activeFilter === 'highfc')   list = list.filter(i => ['Very High','High'].includes(PROPERTIES[i].fcFactor));
  else if (activeFilter === 'walkaway') list = list.filter(i => PROPERTIES[i].score >= 50);

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(i => {
      const p = PROPERTIES[i];
      return (p.addr + p.city + p.zip + p.owner).toLowerCase().includes(q);
    });
  }

  renderCards(list);

  // Sync marker visibility
  markers.forEach((m, i) => {
    if (!m) return;
    if (list.includes(i)) {
      if (!map.hasLayer(m)) map.addLayer(m);
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  applyFilters();
});

// ── Init ──────────────────────────────────────────────────────────────────
geocodeAll();
</script>
</body>
